<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — BG eSIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">

    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">🔐 Admin панел</h1>
        <p class="text-gray-500 text-sm mt-1">BG eSIM Portal</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-6 text-sm text-center">
        ❌ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin" class="space-y-4">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Потребителско име
            </label>
            <input
                type="text"
                name="username"
                placeholder="Въведи потребителско име..."
                required
                autofocus
                class="w-full px-4 py-3 border border-gray-300 rounded-xl
                       focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            >
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Парола
            </label>
            <input
                type="password"
                name="password"
                placeholder="Въведи паролата..."
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-xl
                       focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                   py-3 rounded-xl transition text-sm mt-2">
            Влез →
        </button>
    </form>
    </div>

</body>
</html>
