<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.partner_reset_title }} — BG eSIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">

    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">🔑 {{ t.partner_reset_title }}</h1>
    </div>

    {% if success %}
    <div class="bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-6 text-sm text-center">
        ✅ {{ t.partner_reset_success }}
    </div>
    {% else %}
    <form method="POST" action="/partner/forgot-password" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">{{ t.partner_reset_email_label }}</label>
            <input
                type="email"
                name="email"
                placeholder="partner@example.com"
                required
                autofocus
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            >
        </div>
        <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition text-sm">
            {{ t.partner_reset_send_btn }}
        </button>
    </form>
    {% endif %}

    <div class="text-center mt-4">
        <a href="/partner/login" class="text-sm text-blue-600 hover:underline">← {{ t.partner_login_btn }}</a>
    </div>
</div>

</body>
</html>
